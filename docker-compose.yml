# =====================================================================
# 青苗守护者 · Docker Compose（开发/演示一键启动）
# =====================================================================
# 用法：
#   1. cp .env.example .env
#   2. docker compose up -d        # 启动全部
#   3. docker compose logs -f      # 查看日志
#
# 仅启动基础设施（本地开发后端/前端的场景）：
#   docker compose up -d mysql redis minio
# =====================================================================

services:

  # ---------- 基础设施 ----------
  mysql:
    image: mysql:8.0
    container_name: qingmiao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qingmiao_guardian}
      MYSQL_USER: ${MYSQL_USER:-qingmiao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qingmiao123}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [qingmiao]

  redis:
    image: redis:7-alpine
    container_name: qingmiao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [qingmiao]

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: qingmiao-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [qingmiao]

  # ---------- 应用服务 ----------
  ai_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    container_name: qingmiao-ai
    restart: unless-stopped
    env_file: .env
    environment:
      AI_HOST: 0.0.0.0
      AI_PORT: 8000
      AI_DEVICE: ${AI_DEVICE:-cpu}
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service:/app
      - ai_models:/app/models
    networks: [qingmiao]

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: qingmiao-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      AI_SERVICE_URL: http://ai_service:8000
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks: [qingmiao]

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: qingmiao-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks: [qingmiao]

volumes:
  mysql_data:
  redis_data:
  minio_data:
  ai_models:
  backend_logs:

networks:
  qingmiao:
    driver: bridge
